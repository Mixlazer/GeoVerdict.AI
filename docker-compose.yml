services:
  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.listen-address=:9090"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.1.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/geoverdict.db}
      OPS_TOKEN: ${OPS_TOKEN:-geoverdict-ops-secret}
    volumes:
      - geoverdict_data:/app/backend/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_DEFAULT_CITY: ${NEXT_PUBLIC_DEFAULT_CITY:-Москва}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  llmops:
    build:
      context: .
      dockerfile: llmops-dashboard/Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_OPS_TOKEN: ${VITE_OPS_TOKEN:-geoverdict-ops-secret}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  geoverdict_data:
